<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Madras Walkathon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Concert+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

  <body>
    <div id="global-loader" style="position:fixed;top:0;left:0;right:0;height:3px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;">
      <div style="height:100%;width:30%;background:linear-gradient(90deg,#ff6b35,#ff006e,#7b2ff7);border-radius:0 2px 2px 0;animation:loader-slide 1.2s ease-in-out infinite;"></div>
    </div>
    <style>@keyframes loader-slide { 0% { margin-left:0; width:30%; } 50% { margin-left:40%; width:40%; } 100% { margin-left:100%; width:10%; } }</style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
